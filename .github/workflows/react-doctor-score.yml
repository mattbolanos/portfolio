name: React Doctor Score

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: write

jobs:
  react-doctor-score:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run React Doctor and extract score
        id: react_doctor
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT_FILE="$(mktemp)"
          bunx react-doctor@latest . --yes --score --no-ami | tee "$OUTPUT_FILE"

          SCORE="$(tail -1 "$OUTPUT_FILE" | tr -d '[:space:]')"

          if [[ -z "$SCORE" ]] || ! [[ "$SCORE" =~ ^[0-9]+$ ]]; then
            echo "Unable to extract React Doctor score from output."
            exit 1
          fi

          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "Extracted React Doctor score: $SCORE"

      - name: Update README score
        shell: bash
        env:
          SCORE: ${{ steps.react_doctor.outputs.score }}
        run: |
          set -euo pipefail

          perl -0pi -e 's#(https://www\.react\.doctor/share(?:/badge)?\?[^)\s]*\bs=)\d+#$1$ENV{SCORE}#g' README.md

      - name: Commit README update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- README.md; then
            echo "README already up to date."
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add README.md
          git commit -m "chore(readme): update React Doctor score [skip deploy]"
          git push
